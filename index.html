<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RPS Game</title>
	<link rel="stylesheet" href="./css/style.css">
	<script src="./js/script.js" defer></script>
</head>

<body>
	<h1>Rock Paper Scissors</h1>
	<div id="container">
		<div id="mainMessage">
			<label for="player">Player:</label>
			<input type="text" name="text" id="inputPlayerName">
			<button type="button" id="confirm">START</button>
			<div id="welcomeMessage">
				<!--Current Player-->
			</div>
		</div>
		<div id="gameBoard">
			<div id="playerBoard">
				<!--Player Option-->
			</div>
			<div id="hostBoard">
				<!-- Host Options -->
			</div>
		</div>
		<div id="resultMessage"></div>

</body>

</html>
