<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RPS Game</title>
	<script src="./javascript.js" defer></script>
</head>

<body>
	<h1>Project: Rock Paper Scissors</h1>
	<div id="container">
		<label for="">Player:</label>
		<input type="text" name="text" id="inputPlayerName">
		<button type="button" id="confirm">Confirm</button>
		<form>
			<input type="radio" name="option" id="rock">
			<label for="rock">rock</label>
			<input type="radio" name="option" id="paper">
			<label for="paper">paper</label>
			<input type="radio" name="option" id="scissors">
			<label for="scissors">paper</label>
		</form>
		<div id="CurrentPlayerName">

		</div>
	</div>

</body>

</html>
